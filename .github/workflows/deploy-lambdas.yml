name: Desplegar Lambdas

# Despliega automáticamente a AWS SOLO las lambdas que cambiaron.
# - En cada push a main: detecta las carpetas modificadas bajo 04_Backend/lambdas
#   y actualiza el código de esas funciones.
# - Manual (workflow_dispatch): puedes desplegar una función puntual o todas.
# - Si la función NO existe en AWS, el workflow la CREA:
#     · Runtime SIEMPRE python3.13 (handler lambda_function.lambda_handler).
#     · Rol de ejecución según la convención de abajo. Si el rol tampoco existe
#       en IAM, también lo crea con sus políticas.
#
# ── Convención de roles ──────────────────────────────────────────────────────
# El nombre del rol se AUTO-DETECTA de los clientes boto3 del código de cada
# lambda (o se fija a mano en 04_Backend/lambdas/role-map.json:
# { "NombreCarpeta": "NombreRol" }).
#   · Siempre inicia con "Lambda" → política AWSLambdaBasicExecutionRole
#     (permisos de ejecución + logs en CloudWatch).
#   · Después, tokens separados por "_"; cada token = acceso FULL a un servicio:
#       DynFull   → AmazonDynamoDBFullAccess
#       SES       → AmazonSESFullAccess
#       SQS       → AmazonSQSFullAccess
#       S3        → AmazonS3FullAccess
#       SNS       → AmazonSNSFullAccess
#       Scheduler → AmazonEventBridgeSchedulerFullAccess (EventBridge Scheduler)
#       Bedrock   → AmazonBedrockFullAccess (asistente IA)
#       EUM       → inline sms-voice:* (End User Messaging: SMS y Voz)
#       Social    → inline social-messaging:* (End User Messaging Social: WhatsApp)
#       Invoke    → inline lambda:InvokeFunction (invocar otras lambdas)
#       Basic     → ninguna extra (solo ejecución/logs; lambdas sin AWS, ej. Authorizer)
#   · Orden fijo de tokens: DynFull, SES, SQS, S3, SNS, Scheduler, Bedrock,
#     EUM, Social, Invoke.
#   Ejemplos: Lambda_DynFull_SES_SQS_S3 · Lambda_DynFull_SQS · Lambda_S3
#   Si el rol YA existe en IAM se usa tal cual (no se le tocan las políticas).
#
# ── Triggers y colas SQS (04_Backend/lambdas/trigger-map.json) ──────────────
# En CADA despliegue de una carpeta, el workflow asegura (idempotente) los
# triggers declarados para ella en trigger-map.json:
#   { "NombreCarpeta": { "sqs": "NombreCola", "batchSize": 1 } }
#     · Crea la cola SQS si no existe (VisibilityTimeout 360 s + long polling)
#       y el event source mapping cola→lambda si falta. batchSize default 10.
#     · Una lambda disparada por SQS LEE la cola con su PROPIO rol, así que el
#       trigger fuerza el token _SQS en el rol auto-detectado al crearla.
#   { "NombreCarpeta": { "sns": "NombreTopico" } }
#     · Crea el tópico SNS si no existe, da permiso a SNS de invocar la lambda
#       y la suscribe. OJO: apuntar el config set (SES/EUM) al tópico sigue
#       siendo manual — por eso no viene pre-llenado.
#   { "NombreCarpeta": { "schedule": "rate(5 minutes)" } }
#     · Crea/actualiza una regla de EventBridge (`{funcion}-cron`) con esa
#       expresión rate()/cron() y permiso + target hacia la lambda.
#   (Se pueden combinar varias llaves en la misma entrada.)
# Si la cola/tópico/regla o el trigger ya existen, no se tocan (solo se crea
# lo que falte). Lo que ya está en AWS queda igual.
#
# ── Requisitos (una sola vez) ────────────────────────────────────────────────
# En Settings → Secrets and variables → Actions:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY  (+ AWS_REGION opcional; default us-east-1)
# El usuario IAM de CI necesita ahora:
#   lambda:GetFunctionConfiguration, lambda:UpdateFunctionCode,
#   lambda:UpdateFunctionConfiguration, lambda:CreateFunction,
#   lambda:ListEventSourceMappings, lambda:CreateEventSourceMapping,
#   lambda:AddPermission,
#   iam:GetRole, iam:CreateRole, iam:AttachRolePolicy, iam:PutRolePolicy,
#   iam:PassRole (sobre los roles Lambda_*), sts:GetCallerIdentity,
#   sqs:GetQueueUrl, sqs:CreateQueue, sqs:GetQueueAttributes,
#   (si usas triggers SNS)  sns:CreateTopic, sns:Subscribe, sns:ListSubscriptionsByTopic,
#   (si usas 'schedule')    events:PutRule, events:PutTargets.
# Alternativa más segura: rol OIDC (ver nota al final del archivo).
#
# ⚠️ Al CREAR una función esta nace SIN variables de entorno y SIN layers — eso
# sigue configurándose aparte (DESPLIEGUE.md). Los triggers SÍ se crean si están
# declarados en trigger-map.json (ver arriba).
#
# Nombre de la función en AWS = nombre de la carpeta, salvo que exista un mapeo en
# 04_Backend/lambdas/deploy-map.json  ->  { "NombreCarpeta": "NombreFuncionAWS" }

on:
  push:
    branches: [main]
    paths:
      - '04_Backend/lambdas/**'
  workflow_dispatch:
    inputs:
      function:
        description: 'Una o varias carpetas de lambda (separadas por coma o espacio). Vacío = usar "all".'
        required: false
        default: ''
      all:
        description: 'Desplegar TODAS las lambdas (usar con cuidado: sobrescribe con el código del repo)'
        type: boolean
        required: false
        default: false
      force_runtime313:
        description: 'Migrar también las funciones EXISTENTES a python3.13 (⚠️ layers con binarios de otra versión de Python dejarían de funcionar)'
        type: boolean
        required: false
        default: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  LAMBDAS_DIR: 04_Backend/lambdas
  LAMBDA_RUNTIME: python3.13
  NEW_FN_TIMEOUT: '60'   # segundos (solo funciones nuevas)
  NEW_FN_MEMORY: '256'   # MB (solo funciones nuevas)

jobs:
  deploy:
    name: Actualizar/crear Lambdas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # para poder comparar con el commit anterior en push

      # Mismo Python que el runtime de las lambdas: si algún requirements.txt
      # bundlea dependencias con binarios (reportlab/Pillow…), los wheels
      # instalados deben ser de la MISMA versión de CPython que la función.
      - name: Python 3.13 (igual al runtime de las lambdas)
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determinar qué lambdas desplegar
        id: targets
        env:
          EVENT: ${{ github.event_name }}
          FN_INPUT: ${{ github.event.inputs.function }}
          ALL_INPUT: ${{ github.event.inputs.all }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          DIR="$LAMBDAS_DIR"

          if [ "$EVENT" = "workflow_dispatch" ]; then
            if [ -n "${FN_INPUT}" ]; then
              # Acepta lista separada por coma o espacio.
              printf '%s' "$FN_INPUT" | tr ', ' '\n' | grep -v '^$' | sort -u > folders.txt
            elif [ "${ALL_INPUT}" = "true" ]; then
              ls -1 "$DIR" > folders.txt
            else
              echo "Nada que hacer: indica 'function' o marca 'all'." ; : > folders.txt
            fi
          else
            # push: carpetas de lambda cambiadas entre el commit anterior y este
            git diff --name-only "$BEFORE" "$SHA" \
              | grep "^$DIR/" \
              | sed -E "s#^$DIR/([^/]+)/.*#\1#" \
              | sort -u > folders.txt || true
          fi

          echo "Carpetas candidatas:"; cat folders.txt || true
          echo "count=$(wc -l < folders.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Desplegar
        if: steps.targets.outputs.count != '0'
        env:
          FORCE313: ${{ github.event.inputs.force_runtime313 || 'false' }}
        run: |
          set -euo pipefail
          DIR="$LAMBDAS_DIR"
          MAP="$DIR/deploy-map.json"
          ROLE_MAP="$DIR/role-map.json"
          TRIGGER_MAP="$DIR/trigger-map.json"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          SUMMARY="${GITHUB_STEP_SUMMARY:-/dev/null}"
          echo "### Despliegue de lambdas" >> "$SUMMARY"
          echo "" >> "$SUMMARY"
          echo "| Carpeta | Función AWS | Acción | Runtime | Rol | Triggers |" >> "$SUMMARY"
          echo "|---|---|---|---|---|---|" >> "$SUMMARY"

          resolve_name() {
            local folder="$1"
            if [ -f "$MAP" ]; then
              local mapped
              mapped=$(jq -r --arg k "$folder" '.[$k] // empty' "$MAP")
              [ -n "$mapped" ] && { echo "$mapped"; return; }
            fi
            echo "$folder"
          }

          # ── Convención de roles (ver cabecera del archivo) ──────────────
          managed_arn() {  # token → política administrada de AWS (vacío si es inline)
            case "$1" in
              DynFull)   echo "arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess" ;;
              SES)       echo "arn:aws:iam::aws:policy/AmazonSESFullAccess" ;;
              SQS)       echo "arn:aws:iam::aws:policy/AmazonSQSFullAccess" ;;
              S3)        echo "arn:aws:iam::aws:policy/AmazonS3FullAccess" ;;
              SNS)       echo "arn:aws:iam::aws:policy/AmazonSNSFullAccess" ;;
              Scheduler) echo "arn:aws:iam::aws:policy/AmazonEventBridgeSchedulerFullAccess" ;;
              Bedrock)   echo "arn:aws:iam::aws:policy/AmazonBedrockFullAccess" ;;
              *)         echo "" ;;
            esac
          }

          inline_actions() {  # tokens sin política administrada → acciones inline
            case "$1" in
              EUM)    echo "sms-voice:*" ;;
              Social) echo "social-messaging:*" ;;
              Invoke) echo "lambda:InvokeFunction" ;;
              *)      echo "" ;;
            esac
          }

          detect_role() {  # deduce el rol de los boto3.client|resource() del código
            # $2 = 1 si la lambda es disparada por SQS (el poller lee la cola con el
            #      rol de la FUNCIÓN, así que necesita _SQS aunque su código no lo use)
            local src="$1" force_sqs="${2:-0}" svcs name="Lambda"
            svcs=$(grep -rhoaE "boto3\.(client|resource)\(\s*[\"'][a-z0-9-]+[\"']" "$src" --include='*.py' 2>/dev/null \
                     | sed -E "s/.*[\"']([a-z0-9-]+)[\"']\$/\1/" | sort -u || true)
            has() { printf '%s\n' "$svcs" | grep -qx "$1"; }
            if has dynamodb; then name="${name}_DynFull"; fi
            if has ses || has sesv2; then name="${name}_SES"; fi
            if has sqs || [ "$force_sqs" = "1" ]; then name="${name}_SQS"; fi
            if has s3; then name="${name}_S3"; fi
            if has sns; then name="${name}_SNS"; fi
            if has scheduler; then name="${name}_Scheduler"; fi
            if has bedrock-runtime || has bedrock; then name="${name}_Bedrock"; fi
            if has pinpoint-sms-voice-v2 || has sms-voice; then name="${name}_EUM"; fi
            if has socialmessaging; then name="${name}_Social"; fi
            if has lambda; then name="${name}_Invoke"; fi
            if [ "$name" = "Lambda" ]; then name="Lambda_Basic"; fi
            echo "$name"
          }

          role_for() {  # override en role-map.json > auto-detección
            local folder="$1" src="$2" mapped="" force_sqs=0
            if [ -f "$ROLE_MAP" ]; then
              mapped=$(jq -r --arg k "$folder" '.[$k] // empty' "$ROLE_MAP")
            fi
            if [ -n "$mapped" ]; then echo "$mapped"; return; fi
            if [ -f "$TRIGGER_MAP" ] && [ -n "$(jq -r --arg k "$folder" '.[$k].sqs // empty' "$TRIGGER_MAP" 2>/dev/null)" ]; then
              force_sqs=1
            fi
            detect_role "$src" "$force_sqs"
          }

          add_perm() {  # permiso de invocación sobre la lambda (idempotente)
            # $1=función $2=statement-id $3=principal $4=source-arn
            local out
            if out=$(aws lambda add-permission --function-name "$1" --statement-id "$2" \
                       --action lambda:InvokeFunction --principal "$3" --source-arn "$4" 2>&1); then
              return 0
            fi
            echo "$out" | grep -q "ResourceConflictException" && return 0
            echo "❌ add-permission a $1 falló: $out"; return 1
          }

          TRIGGER_NOTE="-"
          ensure_triggers() {  # crea colas/tópicos/reglas + triggers declarados en trigger-map.json
            local folder="$1" fn="$2" cfg
            TRIGGER_NOTE="-"
            [ -f "$TRIGGER_MAP" ] || return 0
            cfg=$(jq -c --arg k "$folder" '.[$k] // empty' "$TRIGGER_MAP" 2>/dev/null || true)
            [ -n "$cfg" ] || return 0
            local fn_arn="arn:aws:lambda:${AWS_REGION}:${ACCOUNT_ID}:function:${fn}"
            TRIGGER_NOTE=""

            # ── SQS: cola + event source mapping ──
            local qname
            qname=$(echo "$cfg" | jq -r '.sqs // empty')
            if [ -n "$qname" ]; then
              local batch vis qurl qarn uuid out
              batch=$(echo "$cfg" | jq -r '.batchSize // 10')
              vis=$(echo "$cfg" | jq -r '.visibilityTimeout // 360')
              if ! qurl=$(aws sqs get-queue-url --queue-name "$qname" --query QueueUrl --output text 2>/tmp/qerr); then
                if grep -qi "NonExistentQueue\|does not exist" /tmp/qerr; then
                  echo "   📮 Creando cola SQS $qname (VisibilityTimeout=${vis}s, long polling 20s)"
                  qurl=$(aws sqs create-queue --queue-name "$qname" \
                           --attributes "VisibilityTimeout=${vis},ReceiveMessageWaitTimeSeconds=20" \
                           --query QueueUrl --output text)
                  sleep 2
                else
                  echo "❌ Error consultando la cola $qname:"; cat /tmp/qerr
                  echo "   💡 ¿El usuario de CI tiene sqs:GetQueueUrl/CreateQueue/GetQueueAttributes?"
                  exit 1
                fi
              fi
              qarn=$(aws sqs get-queue-attributes --queue-url "$qurl" \
                       --attribute-names QueueArn --query 'Attributes.QueueArn' --output text)
              uuid=$(aws lambda list-event-source-mappings --function-name "$fn" \
                       --event-source-arn "$qarn" --query 'EventSourceMappings[0].UUID' --output text)
              if [ "$uuid" = "None" ] || [ -z "$uuid" ]; then
                echo "   🔗 Creando trigger SQS $qname → $fn (batch $batch)"
                if ! out=$(aws lambda create-event-source-mapping --function-name "$fn" \
                             --event-source-arn "$qarn" --batch-size "$batch" 2>&1); then
                  echo "❌ No se pudo crear el trigger SQS $qname → $fn:"
                  echo "$out"
                  echo "   💡 Si es un error de permisos, el ROL de la función necesita el token _SQS"
                  echo "      (sqs:ReceiveMessage/DeleteMessage/GetQueueAttributes). Ajusta role-map.json"
                  echo "      o agrega las políticas al rol actual y relanza."
                  exit 1
                fi
              else
                echo "   🔗 Trigger SQS $qname → $fn ya existe"
              fi
              TRIGGER_NOTE="SQS:$qname"
            fi

            # ── SNS: tópico + permiso + suscripción ──
            local topic
            topic=$(echo "$cfg" | jq -r '.sns // empty')
            if [ -n "$topic" ]; then
              local tarn sub
              tarn=$(aws sns create-topic --name "$topic" --query TopicArn --output text)  # idempotente
              add_perm "$fn" "sns-${topic}" sns.amazonaws.com "$tarn"
              sub=$(aws sns list-subscriptions-by-topic --topic-arn "$tarn" \
                      --query "Subscriptions[?Endpoint=='${fn_arn}'] | [0].SubscriptionArn" --output text)
              if [ "$sub" = "None" ] || [ -z "$sub" ]; then
                echo "   🔗 Suscribiendo $fn al tópico SNS $topic"
                aws sns subscribe --topic-arn "$tarn" --protocol lambda \
                  --notification-endpoint "$fn_arn" >/dev/null
              else
                echo "   🔗 Suscripción SNS $topic → $fn ya existe"
              fi
              TRIGGER_NOTE="${TRIGGER_NOTE:+$TRIGGER_NOTE }SNS:$topic"
            fi

            # ── EventBridge: regla rate()/cron() → lambda ──
            local sched
            sched=$(echo "$cfg" | jq -r '.schedule // empty')
            if [ -n "$sched" ]; then
              local rule="${fn}-cron" rule_arn
              echo "   🔗 Asegurando regla EventBridge $rule ($sched) → $fn"
              rule_arn=$(aws events put-rule --name "$rule" --schedule-expression "$sched" \
                           --query RuleArn --output text)
              add_perm "$fn" "events-${rule}" events.amazonaws.com "$rule_arn"
              aws events put-targets --rule "$rule" \
                --targets "Id"="1","Arn"="$fn_arn" >/dev/null
              TRIGGER_NOTE="${TRIGGER_NOTE:+$TRIGGER_NOTE }cron:$sched"
            fi
            [ -n "$TRIGGER_NOTE" ] || TRIGGER_NOTE="-"
          }

          ROLE_JUST_CREATED=0
          ensure_role() {  # crea el rol si no existe, con las políticas que dicta su nombre
            local role="$1"
            ROLE_JUST_CREATED=0
            if aws iam get-role --role-name "$role" >/dev/null 2>&1; then
              echo "   🔑 Rol existente: $role (se usa tal cual)"
              return 0
            fi
            case "$role" in
              Lambda_*) ;;
              *) echo "❌ El rol '$role' no cumple la convención (debe iniciar con 'Lambda_')."; return 1 ;;
            esac
            echo "   🔑 Creando rol $role"
            cat > /tmp/trust.json <<'TRUST'
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": { "Service": "lambda.amazonaws.com" },
                "Action": "sts:AssumeRole"
              }
            ]
          }
          TRUST
            aws iam create-role --role-name "$role" \
              --assume-role-policy-document file:///tmp/trust.json \
              --description "Ejecucion de Lambdas MailConnect (auto-creado por deploy-lambdas). Cada token del nombre = acceso full a ese servicio." >/dev/null
            aws iam attach-role-policy --role-name "$role" \
              --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
            echo "      + AWSLambdaBasicExecutionRole (ejecución + logs)"
            local t arn actions
            for t in $(echo "${role#Lambda_}" | tr '_' ' '); do
              if [ "$t" = "Basic" ]; then continue; fi
              arn=$(managed_arn "$t")
              actions=$(inline_actions "$t")
              if [ -n "$arn" ]; then
                aws iam attach-role-policy --role-name "$role" --policy-arn "$arn"
                echo "      + ${arn##*/}"
              elif [ -n "$actions" ]; then
                printf '{ "Version": "2012-10-17", "Statement": [ { "Effect": "Allow", "Action": [ "%s" ], "Resource": "*" } ] }' "$actions" > /tmp/inline.json
                aws iam put-role-policy --role-name "$role" --policy-name "${t}Full" \
                  --policy-document file:///tmp/inline.json
                echo "      + inline ${t}Full ($actions)"
              else
                echo "❌ Token de rol desconocido: '$t'. Válidos: DynFull SES SQS S3 SNS Scheduler Bedrock EUM Social Invoke Basic"
                return 1
              fi
            done
            ROLE_JUST_CREATED=1
          }

          while read -r folder; do
            [ -z "$folder" ] && continue
            src="$DIR/$folder"
            if [ ! -f "$src/lambda_function.py" ]; then
              echo "⏭  $folder: sin lambda_function.py, se omite."
              continue
            fi

            fn=$(resolve_name "$folder")
            echo "📦  Empaquetando $folder → función AWS: $fn"

            work=$(mktemp -d)
            cp -r "$src/." "$work/"
            # Instala dependencias SOLO si requirements.txt trae líneas reales
            # (no comentarios ni vacías). Los requirements.txt del repo suelen ser
            # placeholders en Latin-1 (comentados) y las deps van por layer.
            if [ -f "$work/requirements.txt" ]; then
              real=$(grep -a -Ev '^[[:space:]]*(#|$)' "$work/requirements.txt" | grep -a -c '.' || true)
              [ -z "$real" ] && real=0
              if [ "$real" -gt 0 ]; then
                echo "   Instalando $real dependencia(s) de requirements.txt"
                python -m pip install --quiet -r "$work/requirements.txt" -t "$work"
              else
                echo "   requirements.txt sin dependencias reales; se omite pip."
              fi
            fi
            ( cd "$work" && zip -qr /tmp/lambda.zip . -x '*.pyc' '__pycache__/*' 'requirements.txt' )

            if cfg=$(aws lambda get-function-configuration --function-name "$fn" \
                       --query Runtime --output text 2>&1); then
              # ── La función existe → actualizar código (y runtime si se pidió) ──
              runtime="$cfg"
              if [ "$FORCE313" = "true" ] && [ "$runtime" != "$LAMBDA_RUNTIME" ]; then
                echo "♻️   Migrando runtime de $fn: $runtime → $LAMBDA_RUNTIME"
                aws lambda update-function-configuration --function-name "$fn" \
                  --runtime "$LAMBDA_RUNTIME" >/dev/null
                aws lambda wait function-updated-v2 --function-name "$fn"
                runtime="$LAMBDA_RUNTIME"
              elif [ "$runtime" != "$LAMBDA_RUNTIME" ]; then
                echo "ℹ️   $fn corre en $runtime; para migrarla a $LAMBDA_RUNTIME ejecuta el workflow manual con 'force_runtime313'."
              fi
              echo "🚀  Actualizando código de $fn"
              aws lambda update-function-code \
                --function-name "$fn" \
                --zip-file fileb:///tmp/lambda.zip \
                --publish >/dev/null
              echo "✅  $fn actualizada."
              ensure_triggers "$folder" "$fn"
              echo "| $folder | $fn | actualizada | $runtime | (el actual) | $TRIGGER_NOTE |" >> "$SUMMARY"
            else
              if ! echo "$cfg" | grep -q "ResourceNotFoundException"; then
                echo "❌  Error consultando $fn:"; echo "$cfg"; exit 1
              fi
              # ── La función NO existe → crearla (python3.13 + rol por convención) ──
              role=$(role_for "$folder" "$src")
              echo "🆕  $fn no existe en AWS. Se crea en $LAMBDA_RUNTIME con rol $role"
              ensure_role "$role"
              role_arn="arn:aws:iam::${ACCOUNT_ID}:role/${role}"
              if [ "$ROLE_JUST_CREATED" = "1" ]; then
                echo "   ⏳ Esperando propagación del rol IAM recién creado..."
                sleep 10
              fi
              created=0
              for i in 1 2 3 4 5 6 7 8; do
                if out=$(aws lambda create-function \
                           --function-name "$fn" \
                           --runtime "$LAMBDA_RUNTIME" \
                           --handler lambda_function.lambda_handler \
                           --role "$role_arn" \
                           --timeout "$NEW_FN_TIMEOUT" \
                           --memory-size "$NEW_FN_MEMORY" \
                           --description "MailConnect (auto-creada por deploy-lambdas)" \
                           --zip-file fileb:///tmp/lambda.zip \
                           --publish 2>&1); then
                  created=1
                  break
                fi
                if echo "$out" | grep -qi "cannot be assumed"; then
                  echo "   ⏳ El rol aún se está propagando (intento $i); reintento en 8s..."
                  sleep 8
                else
                  echo "❌  Falló la creación de $fn:"; echo "$out"; exit 1
                fi
              done
              if [ "$created" != "1" ]; then
                echo "❌  No se pudo crear $fn: el rol nunca terminó de propagarse."; exit 1
              fi
              aws lambda wait function-active-v2 --function-name "$fn"
              echo "✅  $fn CREADA ($LAMBDA_RUNTIME, rol $role)."
              ensure_triggers "$folder" "$fn"
              echo "   ⚠️  Recuerda configurar aparte: variables de entorno y layers (ver DESPLIEGUE.md)."
              echo "| $folder | $fn | 🆕 creada | $LAMBDA_RUNTIME | $role | $TRIGGER_NOTE |" >> "$SUMMARY"
            fi
            rm -rf "$work" /tmp/lambda.zip
          done < folders.txt

      - name: Nada que desplegar
        if: steps.targets.outputs.count == '0'
        run: echo "No hubo cambios en lambdas (o no se indicó función)."

# --- Nota: OIDC en lugar de access keys (recomendado) ---
# En vez de AWS_ACCESS_KEY_ID/SECRET, crea un rol IAM con confianza en GitHub OIDC
# (token.actions.githubusercontent.com) y reemplaza el paso de credenciales por:
#   with:
#     role-to-assume: arn:aws:iam::873837768806:role/GitHubDeployLambdas
#     aws-region: us-east-1
# Así no guardas llaves de larga duración en los secretos.
