name: Pruebas de seguridad

# Corre la suite de pruebas (pytest + moto) en cada push y pull request para
# evitar regresiones en las lambdas de seguridad antes de hacer merge.
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  pruebas-seguridad:
    name: pytest (lambdas de seguridad)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 08_Pruebas/PruebasSeguridad

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: 08_Pruebas/PruebasSeguridad/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pruebas
        run: pytest -v
